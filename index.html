<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunny Kumar — Hire a Systems Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg:        #080C16;
      --bg-2:      #0D1220;
      --bg-3:      #111827;
      --bg-card:   #141C2E;
      --border:    #1E2A42;
      --border-2:  #283550;
      --text:      #F0F2FF;
      --text-2:    #94A3B8;
      --text-3:    #4B5A73;
      --indigo:    #6366F1;
      --indigo-2:  #818CF8;
      --indigo-d:  rgba(99,102,241,.12);
      --rose:      #E8956D;
      --rose-d:    rgba(232,149,109,.12);
      --emerald:   #10B981;
      --emerald-d: rgba(16,185,129,.12);
      --amber:     #F59E0B;
      --red:       #EF4444;
      --sans:      'Plus Jakarta Sans', sans-serif;
      --mono:      'JetBrains Mono', monospace;
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--sans); cursor: pointer; border: none; background: none; }
    input, textarea, select { font-family: var(--sans); }
    img { display: block; max-width: 100%; }
    ul { list-style: none; }
    ::selection { background: var(--indigo); color: #fff; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }

    /* ─── LAYOUT ─── */
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 28px; }
    @media (max-width:640px) { .wrap { padding: 0 18px; } }

    /* ─── GRID BACKDROP ─── */
    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 56px 56px;
      opacity: .18;
      mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, black, transparent 80%);
    }

    /* ─── NAV ─── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 90;
      background: rgba(8,12,22,.82);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 62px; gap: 20px;
    }
    .nav-logo {
      font-family: var(--mono); font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-logo-pulse {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--emerald);
      box-shadow: 0 0 10px var(--emerald);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

    .nav-links { display: flex; gap: 22px; align-items: center; }
    .nav-links a {
      font-size: 13.5px; font-weight: 500; color: var(--text-2);
      transition: color .2s; letter-spacing: .01em;
    }
    .nav-links a:hover { color: var(--text); }
    @media (max-width:860px) { .nav-links { display: none; } }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px; border-radius: 10px;
      font-size: 14px; font-weight: 600; letter-spacing: .01em;
      transition: all .2s ease; cursor: pointer;
    }
    .btn-primary {
      background: var(--indigo); color: #fff;
      box-shadow: 0 0 0 0 rgba(99,102,241,0);
    }
    .btn-primary:hover {
      background: #7577f5;
      box-shadow: 0 4px 28px rgba(99,102,241,.5);
      transform: translateY(-1px);
    }
    .btn-ghost {
      border: 1px solid var(--border-2); color: var(--text-2);
    }
    .btn-ghost:hover { border-color: var(--indigo-2); color: var(--text); }
    .btn-rose {
      background: var(--rose); color: #fff;
    }
    .btn-rose:hover {
      background: #ec9e78;
      box-shadow: 0 4px 24px rgba(232,149,109,.45);
      transform: translateY(-1px);
    }
    .btn-sm { padding: 8px 16px; font-size: 13px; border-radius: 8px; }

    /* ─── SECTION SHARED ─── */
    .section { position: relative; z-index: 1; padding: 96px 0; }
    .section-eyebrow {
      font-family: var(--mono); font-size: 11.5px; font-weight: 500;
      letter-spacing: .18em; text-transform: uppercase; color: var(--rose);
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .section-eyebrow::before {
      content: ''; width: 24px; height: 1px; background: var(--rose);
    }
    .section-title {
      font-size: clamp(28px, 4vw, 44px); font-weight: 800;
      line-height: 1.1; letter-spacing: -.02em; margin-bottom: 14px;
    }
    .section-sub {
      font-size: 16px; color: var(--text-2); line-height: 1.7;
      max-width: 600px;
    }
    .section-head { margin-bottom: 56px; }

    /* ─── CHIP / TAG ─── */
    .chip {
      display: inline-flex; align-items: center;
      padding: 4px 11px; border-radius: 99px;
      font-size: 11.5px; font-weight: 500; letter-spacing: .02em;
      border: 1px solid var(--border-2); color: var(--text-2);
      white-space: nowrap;
    }
    .chip-indigo { background: var(--indigo-d); border-color: rgba(99,102,241,.3); color: var(--indigo-2); }
    .chip-emerald { background: var(--emerald-d); border-color: rgba(16,185,129,.3); color: var(--emerald); }
    .chip-rose { background: var(--rose-d); border-color: rgba(232,149,109,.3); color: var(--rose); }

    /* ─── REVEAL ANIMATION ─── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .65s cubic-bezier(.16,1,.3,1), transform .65s cubic-bezier(.16,1,.3,1); }
    .reveal.in { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) { .reveal { opacity:1;transform:none;transition:none; } }

    /* ═══════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════ */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      padding-top: 62px; position: relative;
    }
    .hero-inner {
      display: grid; grid-template-columns: 1.1fr 1fr;
      gap: 52px; align-items: center; width: 100%; padding: 60px 0 40px;
    }
    @media (max-width:860px) {
      .hero-inner { grid-template-columns:1fr; gap:40px; }
    }

    .hero-available {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--emerald-d); border: 1px solid rgba(16,185,129,.3);
      padding: 6px 14px; border-radius: 99px; margin-bottom: 24px;
    }
    .hero-available-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--emerald); box-shadow: 0 0 8px var(--emerald);
      animation: pulse 2s infinite;
    }
    .hero-available span { font-size: 12.5px; font-weight: 600; color: var(--emerald); }

    .hero h1 {
      font-size: clamp(38px, 6.5vw, 76px); font-weight: 800;
      line-height: 1.03; letter-spacing: -.03em; margin-bottom: 22px;
    }
    .hero h1 .grad {
      background: linear-gradient(130deg, #818CF8 0%, #E8956D 60%, #F59E0B 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .hero-desc {
      font-size: 17px; color: var(--text-2); line-height: 1.72;
      max-width: 500px; margin-bottom: 32px;
    }
    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 48px; }

    .hero-stats {
      display: flex; gap: 32px; flex-wrap: wrap;
      border-top: 1px solid var(--border); padding-top: 28px;
    }
    .hero-stat { }
    .hero-stat .num {
      font-size: 28px; font-weight: 800; letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--indigo-2), var(--rose));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .hero-stat .label { font-size: 12px; color: var(--text-3); margin-top: 2px; line-height: 1.4; }

    /* ─── TERMINAL HERO CARD ─── */
    .terminal-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.04);
    }
    .terminal-bar {
      display: flex; align-items: center; gap: 0;
      padding: 13px 16px;
      background: var(--bg-3);
      border-bottom: 1px solid var(--border);
      justify-content: space-between;
    }
    .t-dots { display: flex; gap: 7px; }
    .t-dots span { width: 11px; height: 11px; border-radius: 50%; }
    .t-dots span:nth-child(1) { background:#FF5F57; }
    .t-dots span:nth-child(2) { background:#FEBC2E; }
    .t-dots span:nth-child(3) { background:#28C840; }
    .t-title { font-family: var(--mono); font-size: 11px; color: var(--text-3); }
    .t-status { font-family: var(--mono); font-size: 11px; color: var(--emerald); }
    .terminal-body {
      padding: 22px 22px 26px;
      font-family: var(--mono);
      font-size: 13px;
      line-height: 2;
      min-height: 300px;
    }
    .t-line { display: flex; gap: 10px; }
    .t-prompt { color: var(--indigo-2); flex-shrink: 0; }
    .t-ok { color: var(--emerald); }
    .t-warn { color: var(--amber); }
    .t-dim { color: var(--text-3); }
    .t-rose { color: var(--rose); }
    .cursor {
      display: inline-block; width: 8px; height: 14px;
      background: var(--indigo-2); animation: blink 1s step-end infinite;
      vertical-align: middle; margin-left: 3px;
    }
    @keyframes blink { 50% { opacity:0; } }

    /* profile card snippet */
    .t-card-inner {
      margin-top: 6px;
      background: rgba(99,102,241,.07);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 12px;
      line-height: 1.85;
    }
    .t-card-inner .key { color: var(--indigo-2); }
    .t-card-inner .val { color: var(--text-2); }

    /* ═══════════════════════════════════════════
       TRUST LOGOS
    ═══════════════════════════════════════════ */
    .trust { padding: 32px 0 60px; border-bottom: 1px solid var(--border); position:relative; z-index:1; }
    .trust-label { text-align: center; font-size: 12.5px; color: var(--text-3); letter-spacing:.08em; text-transform:uppercase; margin-bottom: 28px; font-family:var(--mono); }
    .trust-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; flex-wrap: wrap;
    }
    .trust-chip {
      padding: 10px 20px; border-radius: 10px;
      background: var(--bg-card); border: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text-2);
      display: flex; align-items: center; gap: 8px;
    }
    .trust-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

    /* ═══════════════════════════════════════════
       PROJECTS GALLERY
    ═══════════════════════════════════════════ */
    .projects-filter {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px;
    }
    .filter-btn {
      padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
      border: 1px solid var(--border-2); color: var(--text-2);
      transition: all .2s; cursor: pointer; background: transparent;
    }
    .filter-btn:hover { border-color: var(--indigo-2); color: var(--text); }
    .filter-btn.active {
      background: var(--indigo-d); border-color: rgba(99,102,241,.4);
      color: var(--indigo-2);
    }

    .projects-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px;
    }
    @media (max-width: 760px) { .projects-grid { grid-template-columns: 1fr; } }

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden;
      transition: all .3s ease; cursor: pointer;
      display: flex; flex-direction: column;
    }
    .project-card:hover {
      border-color: var(--indigo);
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(99,102,241,.12);
    }
    .project-card.featured {
      grid-column: span 2;
      flex-direction: row;
    }
    @media (max-width: 760px) { .project-card.featured { grid-column: span 1; flex-direction: column; } }

    .project-visual {
      background: var(--bg-2);
      min-height: 200px; position: relative;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; flex-shrink: 0;
    }
    .project-card.featured .project-visual { width: 380px; min-height: 100%; }
    @media (max-width: 760px) { .project-card.featured .project-visual { width: 100%; min-height: 180px; } }

    .project-visual-bg {
      position: absolute; inset: 0;
      opacity: .6;
    }
    .pv-1 { background: radial-gradient(circle at 40% 50%, rgba(99,102,241,.35) 0%, transparent 65%),
                         radial-gradient(circle at 80% 20%, rgba(232,149,109,.2) 0%, transparent 60%); }
    .pv-2 { background: radial-gradient(circle at 60% 40%, rgba(16,185,129,.3) 0%, transparent 65%),
                         radial-gradient(circle at 20% 70%, rgba(99,102,241,.2) 0%, transparent 60%); }
    .pv-3 { background: radial-gradient(circle at 30% 60%, rgba(232,149,109,.35) 0%, transparent 65%),
                         radial-gradient(circle at 70% 30%, rgba(245,158,11,.2) 0%, transparent 60%); }
    .pv-4 { background: radial-gradient(circle at 50% 40%, rgba(99,102,241,.4) 0%, transparent 65%),
                         radial-gradient(circle at 20% 80%, rgba(16,185,129,.2) 0%, transparent 60%); }

    .project-visual-icon {
      position: relative; z-index: 1;
      font-size: 42px; filter: drop-shadow(0 0 20px rgba(255,255,255,.15));
    }
    .project-badge {
      position: absolute; top: 14px; right: 14px;
      background: rgba(8,12,22,.85); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 5px 10px; font-size: 11px; font-weight: 600;
      color: var(--rose); font-family: var(--mono);
    }

    .project-body { padding: 26px; flex: 1; display: flex; flex-direction: column; }
    .project-tags { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
    .project-title { font-size: 19px; font-weight: 700; margin-bottom: 10px; line-height: 1.3; }
    .project-card.featured .project-title { font-size: 22px; }
    .project-desc { font-size: 14px; color: var(--text-2); line-height: 1.7; margin-bottom: 18px; flex: 1; }
    .project-metrics {
      display: flex; gap: 18px; flex-wrap: wrap;
      border-top: 1px solid var(--border); padding-top: 18px; margin-top: auto;
    }
    .project-metric { }
    .project-metric .m-val { font-size: 18px; font-weight: 700; color: var(--indigo-2); letter-spacing: -.01em; }
    .project-metric .m-key { font-size: 11px; color: var(--text-3); margin-top: 1px; }

    /* ═══════════════════════════════════════════
       HOW IT WORKS (PROCESS)
    ═══════════════════════════════════════════ */
    .process-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
    }
    @media (max-width: 860px) { .process-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .process-grid { grid-template-columns: 1fr; } }

    .process-step {
      background: var(--bg-card); padding: 32px 26px;
      position: relative; overflow: hidden;
    }
    .process-step::before {
      content: attr(data-n);
      position: absolute; top: -10px; right: 16px;
      font-size: 72px; font-weight: 800;
      color: rgba(99,102,241,.06); letter-spacing: -.04em;
      line-height: 1; pointer-events: none;
    }
    .ps-icon { font-size: 26px; margin-bottom: 16px; }
    .ps-title { font-size: 15px; font-weight: 700; margin-bottom: 8px; }
    .ps-desc { font-size: 13px; color: var(--text-2); line-height: 1.65; }

    /* ═══════════════════════════════════════════
       REVIEWS
    ═══════════════════════════════════════════ */
    .reviews-wrap { }
    .stars-display { display: inline-flex; gap: 3px; }
    .star-icon { font-size: 15px; }
    .star-filled { color: var(--amber); }
    .star-empty { color: var(--border-2); }

    .reviews-summary {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
      display: flex; gap: 32px; align-items: center;
      flex-wrap: wrap; margin-bottom: 32px;
    }
    .reviews-avg-num { font-size: 52px; font-weight: 800; letter-spacing: -.04em; line-height: 1; }
    .reviews-avg-label { font-size: 13px; color: var(--text-2); margin-top: 4px; }
    .reviews-bars { flex: 1; min-width: 200px; display: flex; flex-direction: column; gap: 7px; }
    .review-bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-3); }
    .review-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .review-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--indigo), var(--rose)); }

    .reviews-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-bottom: 32px; }
    @media (max-width: 680px) { .reviews-grid { grid-template-columns: 1fr; } }

    .review-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px;
    }
    .review-card.new-card {
      border-color: rgba(99,102,241,.35);
      background: rgba(99,102,241,.04);
    }
    .review-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .review-author-name { font-size: 14px; font-weight: 700; }
    .review-author-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
    .review-project { font-size: 11.5px; color: var(--indigo-2); margin-top: 3px; font-family: var(--mono); }
    .review-body { font-size: 14px; color: var(--text-2); line-height: 1.7; }
    .review-date { font-size: 11px; color: var(--text-3); margin-top: 12px; }

    /* ─── Review Form ─── */
    .review-form-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px;
    }
    .form-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .form-sub { font-size: 14px; color: var(--text-2); margin-bottom: 26px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 640px) { .form-grid { grid-template-columns: 1fr; } }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-2); }
    .form-input, .form-textarea, .form-select {
      background: var(--bg-2); border: 1px solid var(--border-2);
      border-radius: 10px; padding: 12px 14px;
      color: var(--text); font-size: 14px;
      transition: border-color .2s; outline: none;
      width: 100%;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    .form-textarea { resize: vertical; min-height: 110px; }
    .form-select { cursor: pointer; appearance: none; }
    .form-select option { background: var(--bg-3); }

    .star-picker { display: flex; gap: 6px; }
    .star-pick-btn {
      font-size: 24px; cursor: pointer; transition: transform .15s;
      background: none; border: none;
    }
    .star-pick-btn:hover, .star-pick-btn.active { transform: scale(1.2); }
    .star-pick-btn.active { filter: drop-shadow(0 0 6px var(--amber)); }

    .form-full { grid-column: span 2; }
    @media (max-width: 640px) { .form-full { grid-column: span 1; } }

    .form-submit-row { margin-top: 20px; display: flex; align-items: center; gap: 14px; }
    .success-msg {
      display: flex; align-items: center; gap: 8px;
      font-size: 13.5px; color: var(--emerald); font-weight: 600;
    }

    /* ═══════════════════════════════════════════
       BOOKING
    ═══════════════════════════════════════════ */
    .booking-layout {
      display: grid; grid-template-columns: 1.1fr 1.4fr; gap: 28px;
    }
    @media (max-width: 860px) { .booking-layout { grid-template-columns: 1fr; } }

    .booking-info { display: flex; flex-direction: column; gap: 18px; }
    .booking-about {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px;
    }
    .ba-avatar {
      width: 64px; height: 64px; border-radius: 14px;
      background: linear-gradient(135deg, var(--indigo), var(--rose));
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 16px;
      font-family: var(--sans); font-weight: 800; color: #fff;
    }
    .ba-name { font-size: 19px; font-weight: 700; margin-bottom: 4px; }
    .ba-role { font-size: 13.5px; color: var(--text-2); margin-bottom: 16px; }
    .ba-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
    .ba-item { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--text-2); }

/* ═══ UTIL ═══ */
function useReveal() {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: .12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, v];
}
function R({ children, delay=0, className='' }) {
  const [ref, v] = useReveal();
  return (
    <div ref={ref} className={`reveal${v?' in':''} ${className}`} style={{ transitionDelay: `${delay}ms` }}>
      {children}
    </div>
  );
}

function Reviews({ showToast }) {
  const [reviews, setReviews] = useState(INITIAL_REVIEWS);

  const [hover, setHover] = useState(0);
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});

  const avgRating = useMemo(() => {
    const sum = reviews.reduce((a, r) => a + r.rating, 0);
    return (sum / reviews.length).toFixed(1);
  }, [reviews]);

  const barCounts = useMemo(() => {
    const counts = { 5:0, 4:0, 3:0, 2:0, 1:0 };
    reviews.forEach(r => counts[r.rating]++);
    return counts;
  }, [reviews]);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = true;
    if (!form.body.trim()) e.body = true;
    if (!form.rating) e.rating = true;
    setErrors(e);
    return Object.keys(e).length === 0;

    if (!validate()) return;

      id: Date.now(),
      author: form.name,
      title: form.title || 'Client',

        <div className="reviews-grid">
          {reviews.map((r, i) => (
            <R key={r.id} delay={i * 50}>

const MEETING_TYPES = [

  { id: 'technical', icon: '⚙️', title: 'Technical Deep-Dive', dur: '60 min', desc: 'Review architecture, code, or complex requirements.' },
  { id: 'proposal', icon: '📋', title: 'Proposal Review', dur: '45 min', desc: 'Walk through scope, timeline, and pricing together.' },
  { id: 'kickoff', icon: '🚀', title: 'Project Kickoff', dur: '60 min', desc: 'For new clients — align on goals and start building.' },
];

const UNAVAILABLE_TIMES = ['10:00 AM', '2:30 PM'];
const ALL_TIMES = ['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM','12:00 PM','2:00 PM','2:30 PM','3:00 PM','3:30 PM','4:00 PM','4:30 PM','5:00 PM'];

function getMonthData(year, month) {
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const cells = [];
  for (let i = firstDay - 1; i >= 0; i--) cells.push({ d: daysInPrev - i, curr: false });
  for (let d = 1; d <= daysInMonth; d++) cells.push({ d, curr: true });
  while (cells.length % 7 !== 0) { cells.push({ d: cells.length - daysInMonth - firstDay + 2, curr: false }); }
  return cells;
}

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function Booking({ showToast }) {
  const today = new Date();
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedTime, setSelectedTime] = useState(null);
  const [meetingType, setMeetingType] = useState('discovery');
  const [step, setStep] = useState('pick'); // pick | form | done
  const [bookedSlots, setBookedSlots] = useState([]); // {dateKey, time}
  const [form, setForm] = useState({ name:'', email:'', company:'', notes:'' });
  const [errors, setErrors] = useState({});

  const cells = useMemo(() => getMonthData(viewYear, viewMonth), [viewYear, viewMonth]);

  const prevMonth = () => {
    if (viewMonth === 0) { setViewMonth(11); setViewYear(y => y-1); }
    else setViewMonth(m => m-1);
    setSelectedDate(null); setSelectedTime(null);
  };
  const nextMonth = () => {
    if (viewMonth === 11) { setViewMonth(0); setViewYear(y => y+1); }
    else setViewMonth(m => m+1);
    setSelectedDate(null); setSelectedTime(null);
  };

  const isPast = (d, curr) => {
    if (!curr) return true;
    const date = new Date(viewYear, viewMonth, d);
    date.setHours(23,59,59);
    return date < today;
  };

  const isWeekend = (cellIndex) => {
    const day = cellIndex % 7;
    return day === 0 || day === 6;
  };

  const dateKey = (d) => `${viewYear}-${viewMonth+1}-${d}`;

  const availableTimes = useMemo(() => {
    if (!selectedDate) return [];
    const key = dateKey(selectedDate);
    const alreadyBooked = bookedSlots.filter(s => s.dateKey === key).map(s => s.time);
    return ALL_TIMES.map(t => ({
      time: t,
      booked: UNAVAILABLE_TIMES.includes(t) || alreadyBooked.includes(t),
    }));
  }, [selectedDate, bookedSlots, viewYear, viewMonth]);

  const selectedMeeting = MEETING_TYPES.find(m => m.id === meetingType);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = true;
    if (!form.email.trim() || !form.email.includes('@')) e.email = true;
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleBook = () => {
    if (!validate()) return;
    if (!selectedDate || !selectedTime) return;
    setBookedSlots(prev => [...prev, { dateKey: dateKey(selectedDate), time: selectedTime }]);
    setStep('done');
    showToast('📅', 'Meeting booked! Check your email for confirmation.');
  };

  const reset = () => {
    setStep('pick');
    setSelectedDate(null);
    setSelectedTime(null);
    setForm({ name:'', email:'', company:'', notes:'' });
    setErrors({});
  };

  return (
    <section className="section section-anchor" id="booking">
      <div className="wrap">
        <R>
          <div className="section-head">
            <div className="section-eyebrow">Schedule a meeting</div>
            <h2 className="section-title">Let's talk about your project.</h2>
            <p className="section-sub">Pick a time that works for you. All calls are free — no pitch, just a real conversation.</p>
          </div>
        </R>

        <R delay={80}>
          <div className="booking-layout">
            {/* LEFT: Info */}
            <div className="booking-info">
              <div className="booking-about">
                <div className="ba-avatar">SK</div>
                <div className="ba-name">Sunny Kumar</div>
                <div className="ba-role">Senior Software Engineer · Full-Stack</div>
                <div className="ba-list">
                  <div className="ba-item"><span className="icon">🌍</span> Patna, India (UTC+5:30)</div>
                  <div className="ba-item"><span className="icon">📧</span> roysunny951@gmail.com</div>
                  <div className="ba-item"><span className="icon">⚡</span> Responds within 24h</div>
                  <div className="ba-item"><span className="icon">💼</span> Open to remote projects</div>
                </div>
                <div className="ba-status">
                  <span className="ba-status-dot"/>
                  Currently available for new projects
                </div>
              </div>

              <div>
                <div style={{ fontWeight:700, fontSize:14, marginBottom:12, color:'var(--text-2)' }}>Meeting type</div>
                <div className="booking-types">
                  {MEETING_TYPES.map(m => (
                    <div key={m.id} className={`booking-type-card${meetingType===m.id?' selected':''}`} onClick={() => setMeetingType(m.id)}>
                      <div className="bt-icon">{m.icon}</div>
                      <div className="bt-title">{m.title}</div>
                      <div className="bt-dur">{m.dur}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* RIGHT: Calendar + Form */}
            <div>
              {step === 'done' ? (
                <div className="booking-calendar">
                  <div className="booked-success">
                    <div className="bs-icon">🎉</div>
                    <div className="bs-title">Meeting confirmed!</div>
                    <div className="bs-desc">
                      <strong>{selectedMeeting.title}</strong> booked for{' '}
                      <strong>{MONTHS[viewMonth]} {selectedDate}, {viewYear}</strong> at{' '}
                      <strong>{selectedTime}</strong> IST.<br/><br/>
                      A confirmation will be sent to <strong>{form.email}</strong>.<br/>
                      I'll reach out within a few hours to share the video link.
                    </div>
                    <button className="btn btn-ghost btn-sm" style={{ marginTop:20 }} onClick={reset}>
                      Book another meeting
                    </button>
                  </div>
                </div>
              ) : (
                <div className="booking-calendar">
                  {/* Calendar header */}
                  <div className="cal-header">
                    <div className="cal-month">{MONTHS[viewMonth]} {viewYear}</div>
                    <div className="cal-nav">
                      <button className="cal-nav-btn" onClick={prevMonth} aria-label="Previous month">‹</button>
                      <button className="cal-nav-btn" onClick={nextMonth} aria-label="Next month">›</button>
                    </div>
                  </div>
                  <div className="cal-weekdays">
                    {DAYS.map(d => <span key={d}>{d}</span>)}
                  </div>
                  <div className="cal-days">
                    {cells.map((cell, i) => {
                      const past = isPast(cell.d, cell.curr);
                      const weekend = isWeekend(i);
                      const isToday = cell.curr && cell.d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();
                      const sel = cell.curr && cell.d === selectedDate;
                      const unavail = past || weekend || !cell.curr;
                      const key = cell.curr ? dateKey(cell.d) : null;
                      const hasBooked = key && bookedSlots.some(s => s.dateKey === key);
                      return (
                        <div
                          key={i}
                          className={`cal-day${!cell.curr?' other-month':''}${past?' past':''}${isToday?' today':''}${sel?' selected':''}${!unavail&&!sel?' available':''}${!unavail?' has-slots':''}`}
                          onClick={() => {
                            if (unavail) return;
                            setSelectedDate(cell.d);
                            setSelectedTime(null);
                          }}
                          title={weekend ? 'Weekend — not available' : past ? 'Past date' : ''}
                        >
                          {cell.d}
                        </div>
                      );
                    })}
                  </div>

                  {/* Time slots */}
                  {selectedDate && (
                    <div className="time-slots-wrap">
                      <div className="time-slots-label">
                        Available times for {MONTHS[viewMonth]} {selectedDate} (IST)
                      </div>
                      <div className="time-slots">
                        {availableTimes.map(({ time, booked }) => (
                          <button
                            key={time}
                            className={`time-slot${booked?' booked':''}${selectedTime===time?' selected':''}`}
                            onClick={() => !booked && setSelectedTime(time)}
                          >
                            {time}
                          </button>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Booking form */}
                  {selectedDate && selectedTime && step === 'pick' && (
                    <div className="booking-form-wrap">
                      <div className="booking-confirm">
                        <div className="bc-row"><span className="bc-label">Meeting</span><span className="bc-val">{selectedMeeting.icon} {selectedMeeting.title} · {selectedMeeting.dur}</span></div>
                        <div className="bc-row"><span className="bc-label">Date</span><span className="bc-val">{MONTHS[viewMonth]} {selectedDate}, {viewYear}</span></div>
                        <div className="bc-row"><span className="bc-label">Time</span><span className="bc-val">{selectedTime} IST</span></div>
                      </div>
                      <div className="booking-form-title">Your details</div>
                      <div className="form-grid">
                        <div className="form-group">
                          <label className="form-label">Full name *</label>
                          <input className="form-input" style={errors.name?{borderColor:'var(--red)'}:{}} placeholder="Your name" value={form.name} onChange={e => setForm(f=>({...f,name:e.target.value}))} />
                        </div>
                        <div className="form-group">
                          <label className="form-label">Email *</label>
                          <input className="form-input" type="email" style={errors.email?{borderColor:'var(--red)'}:{}} placeholder="you@company.com" value={form.email} onChange={e => setForm(f=>({...f,email:e.target.value}))} />
                        </div>
                        <div className="form-group">
                          <label className="form-label">Company</label>
                          <input className="form-input" placeholder="Optional" value={form.company} onChange={e => setForm(f=>({...f,company:e.target.value}))} />
                        </div>
                        <div className="form-group">
                          <label className="form-label">What to discuss</label>
                          <input className="form-input" placeholder="Brief description…" value={form.notes} onChange={e => setForm(f=>({...f,notes:e.target.value}))} />
                        </div>
                      </div>
                      <div style={{ marginTop:18 }}>
                        <button className="btn btn-primary" onClick={handleBook} style={{ width:'100%', justifyContent:'center' }}>
                          Confirm Booking →
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </R>
      </div>
    </section>
  );
}

/* ═══ APP ═══ */
function App() {
  const [toast, setToast] = useState(null);
  const [bookingOpen, setBookingOpen] = useState(false);

  const showToast = useCallback((icon, msg) => {
    setToast({ icon, msg });
  }, []);

  const scrollToBooking = () => {
    const el = document.getElementById('booking');
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    setBookingOpen(true);
  };

  return (
    <>
      <Nav onBookClick={scrollToBooking} />
      <Hero onBookClick={scrollToBooking} />
      <Trust />
      <Projects />
      <Process />
      <Reviews showToast={showToast} />
      <Booking showToast={showToast} />
      <CTA onBookClick={scrollToBooking} />
      <Footer />
      {toast && (
        <Toast icon={toast.icon} msg={toast.msg} onClose={() => setToast(null)} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
